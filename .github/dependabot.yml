version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # Ignore routine version bumps for transitive dependencies.
      # Security alerts bypass these ignore rules and will still be raised.
      - dependency-name: "urllib3"
      - dependency-name: "filelock"
      - dependency-name: "requests"
      - dependency-name: "certifi"
      - dependency-name: "charset-normalizer"
      - dependency-name: "idna"
